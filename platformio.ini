; PlatformIO project — "Overhead": multi-tab CYD sky dashboard.
;
; Target (first variant): 4" Cheap Yellow Display — "ESP32-32E 4 inch",
; ST7796S 480x320, XPT2046 resistive touch on the *shared* LCD SPI bus.
; Pinout: https://www.lcdwiki.com/4.0inch_ESP32-32E_Display
;
; Build / flash:
;   pio run -e cyd4_st7796                compile
;   pio run -e cyd4_st7796 -t upload      flash over USB
;   pio device monitor                    serial console @115200
;   pio run -e cyd4_st7796 -t uploadfs    upload LittleFS image (data/)
;
; Multi-target by design (spec §3.1): every board variant is its own [env:...].
; Shared code is variant-agnostic and reads the pins + capability flags that
; the per-env build_flags pull in via hal/Board.h. Adding a board = a new env,
; not a fork.

[platformio]
default_envs = cyd28_ili9341

[env]
; arduino-esp32 2.0.x (espressif32 6.9.0): battle-tested on this CYD family
; (matches the BladeAir build) and keeps the binary comfortably inside the
; 1.5 MB app slot. A later migration to arduino-esp32 3.x (pioarduino) is
; possible but not needed for bring-up.
platform = espressif32 @ 6.9.0
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Custom 4 MB table: dual-OTA 1.5 MB app slots + ~0.94 MB LittleFS for caches,
; catalogs and fonts (spec §3.1). OTA matters from day one on a wall unit.
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

lib_deps =
    lovyan03/LovyanGFX @ ^1.2.0
    bblanchon/ArduinoJson @ ^7
    https://github.com/tzapu/WiFiManager.git
    ; ESP32Async pair (maintained mathieucarbou successor) — AsyncTCP pinned
    ; FIRST so the matching, const-correct version wins LDF on both core 2.0.x
    ; and 3.x. The mismatched registry AsyncTCP breaks the 2.0.x build.
    https://github.com/ESP32Async/AsyncTCP.git
    https://github.com/ESP32Async/ESPAsyncWebServer.git
    ayushsharma82/ElegantOTA @ ^3
    ; --- added with the astro core (milestone 2) ---
    ; an SGP4 lib (confirm permissive license) ; MarScaper/Ephemeris (GPLv3, gated)

build_flags =
    -D OVERHEAD_FW_VERSION=\"0.0.1\"
    -D ELEGANTOTA_USE_ASYNC_WEBSERVER=1

; ---------------------------------------------------------------------------
; 2.8" CYD: ESP32-2432S028R, ILI9341 240x320, XPT2046 on a SEPARATE VSPI bus,
; no PSRAM. The board on hand (see ../BladeAir/cyd.md). Default env.
; ---------------------------------------------------------------------------
[env:cyd28_ili9341]
board = esp32dev
build_flags =
    ${env.build_flags}
    -D BOARD_CYD28_ILI9341=1
    ; Dual-USB (USB-C) variants wire ILI9341 with reversed RGB polarity and
    ; need this set to 1; single-USB (micro-USB only) variants want 0 (cyd.md).
    -D CYD_INVERT_DISPLAY=0

; ---------------------------------------------------------------------------
; 4" CYD: ESP32-32E, ST7796S 480x320, XPT2046 (shared SPI bus), no PSRAM.
; ---------------------------------------------------------------------------
[env:cyd4_st7796]
board = esp32dev
build_flags =
    ${env.build_flags}
    -D BOARD_CYD4_ST7796=1
    ; Flip to 1 if colours look inverted — some ST7796 CYD panels need it,
    ; some don't (same story as the 2.8" ILI9341 variants).
    -D CYD_INVERT_DISPLAY=0

; ---------------------------------------------------------------------------
; Elecrow CrowPanel Advance 5.0-HMI: ESP32-S3, 16 MB flash, 8 MB octal PSRAM,
; 800x480 parallel-RGB (ST7262), GT911 capacitive touch, I2C-expander backlight.
; Pins from ../cyd-radio/crowpanel-5in.md (authoritative — trust it over the
; Elecrow wiki). Serial is over a CH340 UART, not the S3's native USB.
; ---------------------------------------------------------------------------
[env:crowpanel_s3_5hmi]
; arduino-esp32 3.x (pioarduino) — needed because the S3 parallel-RGB LCD
; driver (esp_lcd) that LovyanGFX's Bus_RGB depends on is NOT exposed by the
; classic espressif32 2.0.x platform. The classic ESP32 CYD stays on 2.0.x.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitc-1
board_build.flash_mode  = qio
board_build.flash_size  = 16MB
board_upload.flash_size = 16MB
board_build.psram_type  = opi               ; octal PSRAM
board_build.arduino.memory_type = qio_opi
board_build.partitions  = partitions_16mb.csv
build_flags =
    ${env.build_flags}
    -D BOARD_CROWPANEL_S3_5HMI=1
    -D BOARD_HAS_PSRAM=1
    -D ARDUINO_USB_CDC_ON_BOOT=0            ; serial via CH340 UART, not native USB
