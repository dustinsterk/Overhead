; PlatformIO project — "Overhead": multi-tab CYD sky dashboard.
;
; Target (first variant): 4" Cheap Yellow Display — "ESP32-32E 4 inch",
; ST7796S 480x320, XPT2046 resistive touch on the *shared* LCD SPI bus.
; Pinout: https://www.lcdwiki.com/4.0inch_ESP32-32E_Display
;
; Build / flash:
;   pio run -e cyd4_st7796                compile
;   pio run -e cyd4_st7796 -t upload      flash over USB
;   pio device monitor                    serial console @115200
;   pio run -e cyd4_st7796 -t uploadfs    upload LittleFS image (data/)
;
; Multi-target by design (spec §3.1): every board variant is its own [env:...].
; Shared code is variant-agnostic and reads the pins + capability flags that
; the per-env build_flags pull in via hal/Board.h. Adding a board = a new env,
; not a fork.

[platformio]
default_envs = cyd28_ili9341

[env]
; CYD envs use the registry espressif32 2.0.x core: it's far leaner on RAM
; (~191 KB free vs ~92 KB on 3.x) which the no-PSRAM ESP32 needs for TLS reads —
; on 3.x the largest free block was too small and HTTPS bodies came back empty.
; The CrowPanel env overrides this with pioarduino 3.x (it has 8 MB PSRAM and
; needs the S3 esp_lcd RGB driver). NOTE: mixing the two espressif32 platforms
; shares a package namespace, so a CYD build can prune the pioarduino framework;
; if a CrowPanel build fails with FRAMEWORK_DIR/None, run (via PowerShell):
;   platformio pkg install -e crowpanel_s3_5hmi
platform = espressif32 @ 6.9.0
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Custom 4 MB table: dual-OTA 1.5 MB app slots + ~0.94 MB LittleFS for caches,
; catalogs and fonts (spec §3.1). OTA matters from day one on a wall unit.
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

lib_deps =
    lovyan03/LovyanGFX @ 1.2.21   ; pinned: scripts/patch_lovyangfx.py anchors this version
    bblanchon/ArduinoJson @ ^7
    https://github.com/tzapu/WiFiManager.git
    ; ESP32Async pair (maintained mathieucarbou successor) — AsyncTCP pinned
    ; FIRST so the matching, const-correct version wins LDF on both core 2.0.x
    ; and 3.x. The mismatched registry AsyncTCP breaks the 2.0.x build.
    https://github.com/ESP32Async/AsyncTCP.git
    https://github.com/ESP32Async/ESPAsyncWebServer.git
    ayushsharma82/ElegantOTA @ ^3
    ; astro core (milestone 2): SGP4 is MIT (permissive). MarScaper/Ephemeris is
    ; GPLv3 and gated behind ENABLE_EPHEM — add it only when that flag is on.
    https://github.com/Hopperpop/Sgp4-Library.git
    bitbank2/JPEGENC @ ^1.1.0    ; MCU-at-a-time JPEG encoder for /api/screen.jpg

build_flags =
    -D OVERHEAD_FW_VERSION=\"0.0.1\"
    -D ELEGANTOTA_USE_ASYNC_WEBSERVER=1

; ---------------------------------------------------------------------------
; 2.8" CYD: ESP32-2432S028R, ILI9341 240x320, XPT2046 on a SEPARATE VSPI bus,
; no PSRAM. The board on hand (see ../BladeAir/cyd.md). Default env.
; ---------------------------------------------------------------------------
[env:cyd28_ili9341]
board = esp32dev
build_flags =
    ${env.build_flags}
    -D BOARD_CYD28_ILI9341=1
    ; Dual-USB (USB-C) variants wire ILI9341 with reversed RGB polarity and
    ; need this set to 1; single-USB (micro-USB only) variants want 0 (cyd.md).
    -D CYD_INVERT_DISPLAY=0

; ---------------------------------------------------------------------------
; 2.8" CYD variant: Elegoo "USB-C only" board. Same ESP32-2432S028 hardware as
; cyd28_ili9341, but its ILI9341 is portrait-native, so landscape is an ODD
; rotation (panel 240x320, rotation 1) and touch needs no axis inversion.
; Reuses the cyd28 board block (BOARD_CYD28_ILI9341); hal/Board.h wraps the
; orientation defines in #ifndef so these -D flags override them.
; ---------------------------------------------------------------------------
[env:cyd28_elegoo]
board = esp32dev
build_flags =
    ${env.build_flags}
    -D BOARD_CYD28_ILI9341=1
    -D BOARD_CYD28_ELEGOO=1
    -D CYD_INVERT_DISPLAY=0
    -D TFT_PANEL_WIDTH=240
    -D TFT_PANEL_HEIGHT=320
    -D DISPLAY_DEFAULT_ROTATION=1
    -D TOUCH_INVERT_X=0
    -D TOUCH_INVERT_Y=0

; ---------------------------------------------------------------------------
; 4" CYD: ESP32-32E, ST7796S 480x320, XPT2046 (shared SPI bus), no PSRAM.
; ---------------------------------------------------------------------------
[env:cyd4_st7796]
board = esp32dev
build_flags =
    ${env.build_flags}
    -D BOARD_CYD4_ST7796=1
    ; Flip to 1 if colours look inverted — some ST7796 CYD panels need it,
    ; some don't (same story as the 2.8" ILI9341 variants).
    -D CYD_INVERT_DISPLAY=0

; ---------------------------------------------------------------------------
; Elecrow CrowPanel Advance 5.0-HMI: ESP32-S3, 16 MB flash, 8 MB octal PSRAM,
; 800x480 parallel-RGB (ST7262), GT911 capacitive touch, I2C-expander backlight.
; Pins from ../cyd-radio/crowpanel-5in.md (authoritative — trust it over the
; Elecrow wiki). Serial is over a CH340 UART, not the S3's native USB.
; ---------------------------------------------------------------------------
[env:crowpanel_s3_5hmi]
; pioarduino arduino-esp32 3.x / IDF5: needed for esp_lcd RGB num_fbs (HW double-buffer,
; vsync-atomic swap) + bounce buffers (decouple the scan from PSRAM bandwidth) — the
; proper anti-tearing path. We drive the panel with esp_lcd directly (NOT LovyanGFX's
; Bus_RGB, whose i80 interrupt is starved on IDF5); LovyanGFX is used only for the
; off-screen canvas + GT911 touch. Build in an isolated core dir to avoid the registry
; espressif32 (CYD) package-namespace clash:  set PLATFORMIO_CORE_DIR=...\.platformio-crowpanel
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
extra_scripts = pre:scripts/patch_lovyangfx.py   ; neuter Bus_RGB scan (esp_lcd owns it)
board = esp32-s3-devkitc-1
board_build.flash_mode  = qio
board_build.flash_size  = 16MB
board_upload.flash_size = 16MB
board_build.psram_type  = opi               ; octal PSRAM
board_build.arduino.memory_type = qio_opi
board_build.partitions  = partitions_16mb.csv
build_flags =
    ${env.build_flags}
    -D BOARD_CROWPANEL_S3_5HMI=1
    -D BOARD_HAS_PSRAM=1
    -D ARDUINO_USB_CDC_ON_BOOT=0            ; serial via CH340 UART, not native USB

; ---------------------------------------------------------------------------
; Elecrow CrowPanel ESP32 HMI 5.0 (p/n 502727): ESP32-S3-N4R8 (4 MB flash, 8 MB
; PSRAM), 800x480 RGB (ILI6122/ILI5960), GT911 touch, DIRECT-GPIO backlight (IO2).
; Reuses the Advance's esp_lcd RGB path (BOARD_CROWPANEL_S3_5HMI) with the 502727
; pins/backlight (BOARD_CROWPANEL_HMI5). UNVERIFIED first pass -- RGB data-bit order +
; timing polarity (Board.h RGB_* + RGB_PCLK_*) will likely need on-hardware bring-up.
; Same isolated-core-dir caveat as the Advance env (PLATFORMIO_CORE_DIR=...\.platformio-crowpanel).
; ---------------------------------------------------------------------------
[env:crowpanel_hmi5]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
extra_scripts = pre:scripts/patch_lovyangfx.py
board = esp32-s3-devkitc-1
board_build.flash_mode  = qio
board_build.flash_size  = 4MB
board_upload.flash_size = 4MB
board_build.psram_type  = opi               ; octal PSRAM (N4R8)
board_build.arduino.memory_type = qio_opi
board_build.partitions  = partitions_hmi5.csv   ; 4 MB single-slot (no OTA; ~1.9 MB S3 fw) + LittleFS
build_flags =
    ${env.build_flags}
    -D BOARD_CROWPANEL_S3_5HMI=1
    -D BOARD_CROWPANEL_HMI5=1
    -D BOARD_HAS_PSRAM=1
    -D ARDUINO_USB_CDC_ON_BOOT=0            ; serial via CH340 UART, not native USB
